<!DOCTYPE html>
<html lang = 'en'>
	<meta charset = 'utf-8'>
	<head>
		<title> Library </title>
		<link rel = "stylesheet" href = "style.css">
	</head>
	<body>
		<div class = "container test">
			<div class = "header"> 
				<div class = "heading"> <h2> Library </h2> </div> <br>

				<div class = "buttons"> <button command = "show-modal" commandfor = "myDialog" class = "addButton"> Add </button> 
					<dialog id = "myDialog">
						<p> this is to check our dialog box </p>
						
					        <form action = "/submitBook" method = "post">
							<label for = "bookName"> Name of book </label>
							<input type = "text" id = "bookName" name = "bookName" required>

							

                          	<label for = "authorName"> Name of Author </label>
							<input type = "text" id = "authorName" name = "authorName" required>

							<label for = "pageNumber"> Number of pages </label>
							<input type = "number" id = "pageNumber" >

                                                  	
							<label for = "read"> Read</label>
                            <input type = "radio" id = "read" name = "status" value = "Read">  

                            <label for = "notread"> Not Read</label>
                            <input type = "radio" id = "notRead" name = "status" value = "Not Read">
						</form>

						<button commandfor = "myDialog" command = "close" class = "formBtn"> Close </button>
                        <button commadfor = "myDialog" command = "submit" class = "submit"> Submit </button>
					</dialog>
				</div>
			</div> 

			<div class = "main">

				</div>

		
				<div class = footer> &copy Anas Dagga </div>
		</div>

		</body>
</html>
